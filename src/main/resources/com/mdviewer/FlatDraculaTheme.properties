# Dracula colour palette for FlatLaf
# Reference: https://draculatheme.com/

@background       = #282a36
@currentLine      = #44475a
@selection        = #44475a
@foreground       = #f8f8f2
@comment          = #6272a4
@cyan             = #8be9fd
@green            = #50fa7b
@orange           = #ffb86c
@pink             = #ff79c6
@purple           = #bd93f9
@red              = #ff5555
@yellow           = #f1fa8c

# Core overrides
background                          = @background
foreground                          = @foreground

# Controls
Button.background                   = @currentLine
Button.foreground                   = @foreground
Button.hoverBackground              = #6272a4
Button.pressedBackground            = #44475a

# Text fields
TextField.background                = @currentLine
TextField.foreground                = @foreground
TextField.caretForeground           = @foreground

TextArea.background                 = @currentLine
TextArea.foreground                 = @foreground
TextArea.caretForeground            = @foreground

# Scroll bars
ScrollBar.thumb                     = @currentLine
ScrollBar.track                     = @background

# Menu
MenuBar.background                  = @background
Menu.selectionBackground            = @currentLine
MenuItem.selectionBackground        = @currentLine

# Selection
selectionBackground                 = @selection
selectionForeground                 = @foreground

# Focus indicator colour (Dracula pink)
Component.focusColor                = @pink
Component.focusedBorderColor        = @pink

# Title bar / window decorations (JDK on macOS uses native title bar so this
# only affects Windows/Linux with custom decorations)
TitlePane.background                = @background
TitlePane.foreground                = @foreground

# Separators
Separator.foreground                = @currentLine
